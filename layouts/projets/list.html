{{ define "main" }}
  <section class="projects-page">
    <div class="container">
      <div class="page-header">
        <span class="eyebrow">Projets</span>
        <h1>{{ .Title }}</h1>
        <p>{{ .Description }}</p>
      </div>
      <div class="project-grid project-grid-3d">
        {{ range .Pages }}
          <a class="project-card project-3d" href="{{ .Params.git_url }}" target="_blank" rel="noopener noreferrer">
            <div class="project-card-inner">
              <div class="project-face project-face-front">
                <h2>{{ .Title }}</h2>
                <p>{{ .Summary }}</p>
              </div>
              <div class="project-face project-face-top"></div>
            </div>
            <div class="project-meta">
              <span>{{ .Date.Format "02 Jan 2006" }}</span>
              <span>{{ range $i, $tag := .Params.tags }}{{ if $i }}, {{ end }}{{ $tag }}{{ end }}</span>
            </div>
          </a>
        {{ end }}
      </div>
    </div>
  </section>
{{ end }}
